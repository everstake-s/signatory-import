name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v2.1.3, etc.

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -installsuffix cgo -ldflags="-w -s" -o aws-signatory-import-linux-amd64 .
      
      - name: Create checksum
        run: |
          sha256sum aws-signatory-import-linux-amd64 > aws-signatory-import-linux-amd64.sha256
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            aws-signatory-import-linux-amd64
            aws-signatory-import-linux-amd64.sha256
          body: |
            ## Release ${{ steps.get_version.outputs.VERSION }}
            
            ### Installation
            ```bash
            # Download the binary
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/aws-signatory-import-linux-amd64
            
            # Verify checksum
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.VERSION }}/aws-signatory-import-linux-amd64.sha256
            sha256sum -c aws-signatory-import-linux-amd64.sha256
            
            # Make executable
            chmod +x aws-signatory-import-linux-amd64
            
            # Move to PATH (optional)
            sudo mv aws-signatory-import-linux-amd64 /usr/local/bin/aws-signatory-import
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

